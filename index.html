<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>チーム柳会</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root {
    --green:#1a6b3c;--green-d:#145530;--green-light:#e8f5ee;--green-mid:#2d9e5f;
    --gold:#c8991a;--gold-light:#fff8e1;
    --surface:#f7f6f2;--card:#ffffff;--border:#e2dfd8;
    --text:#1c1c1a;--muted:#6b6860;--danger:#c0392b;--chip:#1a5fa8;
    --s23:#7c3aed;--s24:#0369a1;--s25:#15803d;--s26:#b45309;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Hiragino Sans','Yu Gothic',sans-serif;background:var(--surface);color:var(--text);min-height:100vh;}
  header{background:var(--green);color:white;padding:0 1.5rem;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.18);}
  header h1{font-size:1.1rem;font-weight:700;letter-spacing:.05em;}
  nav{display:flex;gap:4px;}
  nav button{background:transparent;border:1.5px solid rgba(255,255,255,.35);color:white;border-radius:6px;padding:5px 12px;font-size:.8rem;cursor:pointer;transition:all .15s;font-family:inherit;}
  nav button.active,nav button:hover{background:rgba(255,255,255,.18);border-color:rgba(255,255,255,.7);}
  main{max-width:1100px;margin:0 auto;padding:1.5rem 1rem 2rem;}
  .page{display:none;}.page.active{display:block;}
  .card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.25rem 1.5rem;margin-bottom:1rem;}
  .card-title{font-size:.78rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:1rem;}
  .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:1rem;}
  .stat-card{background:var(--surface);border-radius:8px;padding:.9rem 1rem;border:1px solid var(--border);}
  .stat-label{font-size:.72rem;color:var(--muted);margin-bottom:4px;}
  .stat-value{font-size:1.5rem;font-weight:700;}
  .stat-value.gold{color:var(--gold);}.stat-value.green{color:var(--green-mid);}
  .form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;}
  .form-group{display:flex;flex-direction:column;gap:4px;}
  label{font-size:.78rem;font-weight:600;color:var(--muted);}
  input,select{border:1px solid var(--border);border-radius:7px;padding:8px 10px;font-size:.9rem;font-family:inherit;background:var(--surface);color:var(--text);transition:border-color .15s;}
  input:focus,select:focus{outline:none;border-color:var(--green-mid);background:white;}
  .rank{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:50%;font-weight:700;font-size:.75rem;}
  .rank-1{background:#ffe066;color:#7a5c00;}.rank-2{background:#e0e0e0;color:#555;}
  .rank-3{background:#f0c080;color:#7a4500;}.rank-4{background:#f0f0f0;color:#888;}
  .table-wrap{overflow-x:auto;}
  table{width:100%;border-collapse:collapse;font-size:.82rem;}
  th{background:var(--surface);color:var(--muted);font-size:.7rem;font-weight:700;letter-spacing:.05em;text-align:left;padding:7px 10px;border-bottom:1.5px solid var(--border);white-space:nowrap;}
  td{padding:8px 10px;border-bottom:1px solid var(--border);vertical-align:middle;}
  tr:last-child td{border-bottom:none;}tr:hover td{background:var(--green-light);}
  .btn{border:none;border-radius:7px;padding:9px 18px;font-size:.88rem;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s;display:inline-flex;align-items:center;gap:6px;}
  .btn-primary{background:var(--green);color:white;}.btn-primary:hover{background:var(--green-d);}
  .btn-secondary{background:var(--surface);color:var(--text);border:1px solid var(--border);}.btn-secondary:hover{background:var(--border);}
  .btn-gold{background:var(--gold);color:white;}.btn-gold:hover{background:#a87c14;}
  .chip-badge{display:inline-flex;align-items:center;background:#e8f0fa;color:var(--chip);border-radius:5px;padding:2px 7px;font-size:.75rem;font-weight:600;}
  .season-badge{display:inline-flex;align-items:center;border-radius:5px;padding:2px 7px;font-size:.72rem;font-weight:700;}
  .s23{background:#ede9fe;color:var(--s23);}.s24{background:#e0f2fe;color:var(--s24);}.s25{background:#dcfce7;color:var(--s25);}.s26{background:#fef3c7;color:var(--s26);}
  .player-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);}
  .player-row:last-child{border-bottom:none;}
  .player-avatar{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;flex-shrink:0;}
  .player-name{font-weight:600;font-size:.95rem;}.player-stats{font-size:.75rem;color:var(--muted);}
  .av0{background:#e8f5ee;color:#1a6b3c;}.av1{background:#e8f0fa;color:#1a5fa8;}.av2{background:#fff3cd;color:#7a5c00;}
  .av3{background:#fce8e8;color:#b03020;}.av4{background:#ede9fe;color:#5b21b6;}.av5{background:#fef3c7;color:#92400e;}
  .av6{background:#f0fdf4;color:#166534;}.av7{background:#fdf2f8;color:#9d174d;}

  .filter-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1rem;align-items:center;}
  .filter-btn{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:4px 12px;font-size:.78rem;cursor:pointer;font-family:inherit;transition:all .15s;}
  .filter-btn.active{background:var(--green);color:white;border-color:var(--green);}
  .session-block{border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:12px;}
  .session-header{background:var(--surface);padding:10px 14px;display:flex;align-items:center;gap:10px;cursor:pointer;}
  .session-header:hover{background:var(--green-light);}
  .session-content{padding:0;display:none;}.session-content.open{display:block;}
  .toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#222;color:white;border-radius:8px;padding:10px 20px;font-size:.85rem;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;}
  .toast.show{opacity:1;}
  .section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:8px;}
  .section-header h2{font-size:1.05rem;font-weight:700;}
  .pos{color:var(--green-mid);font-weight:600;}.neg{color:var(--danger);font-weight:600;}
  .chart-container{position:relative;height:320px;margin-top:.5rem;}
  .player-checkbox-grid{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:1rem;}
  .player-cb{display:flex;align-items:center;gap:5px;background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:4px 12px;cursor:pointer;font-size:.82rem;transition:all .15s;user-select:none;}
  .player-cb.checked{color:white;border-color:transparent;}
  @media(max-width:600px){nav button{padding:5px 7px;font-size:.72rem;}.stats-grid{grid-template-columns:repeat(2,1fr);}}
</style>
</head>
<body>
<header>
  <h1>🀄 チーム柳会</h1>
  <nav>
    <button class="active" onclick="showPage('home')">ホーム</button>
    <button onclick="showPage('history')">履歴</button>
    <button onclick="showPage('players')">成績</button>
    <button onclick="showPage('graph')">グラフ</button>
    <button onclick="showPage('input')">入力</button>
    <button onclick="exportData()" style="background:rgba(200,153,26,.25);border-color:rgba(200,153,26,.7);">📥 保存</button>
  </nav>
</header>
<main>

<!-- HOME -->
<div id="page-home" class="page active">
  <div class="card">
    <div class="card-title" id="home-ranking-title">🏆 ランキング</div>
    <div id="player-standings"></div>
  </div>
  <div class="card">
    <div class="card-title" id="home-venue-title">🏠 店舗別利用実績</div>
    <div id="venue-standings"></div>
  </div>
</div>

<!-- HISTORY -->
<div id="page-history" class="page">
  <div class="card">
    <div class="section-header">
      <h2>対局履歴</h2>
      <input type="text" id="search-h" placeholder="名前 / 場所" style="width:140px;font-size:.82rem;" oninput="renderHistory()">
    </div>
    <div class="filter-bar" id="season-filter">
      <span style="font-size:.76rem;color:var(--muted);">年度:</span>
    </div>
    <div id="history-list"></div>
  </div>
</div>

<!-- PLAYERS -->
<div id="page-players" class="page">
  <div class="card">
    <div class="section-header">
      <h2>プレイヤー別成績</h2>
      <div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center;">
        <span style="font-size:.76rem;color:var(--muted);">絞込:</span>
        <select id="player-filter-type" onchange="renderPlayers()" style="font-size:.8rem;padding:4px 8px;">
          <option value="season">年度別</option>
          <option value="venue">会場別</option>
        </select>
        <select id="player-filter-val" onchange="renderPlayers()" style="font-size:.8rem;padding:4px 8px;"></select>
      </div>
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr><th>#</th><th>プレイヤー</th><th>対局数</th><th>半荘</th><th>1位</th><th>2位</th><th>3位</th><th>4位</th><th>1位率</th><th>平均順位</th><th>合計点数</th><th>合計チップ</th></tr></thead>
        <tbody id="players-tbody"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- GRAPH -->
<div id="page-graph" class="page">
  <div class="card">
    <div class="section-header">
      <h2>ポイント推移グラフ</h2>
      <select id="graph-season" onchange="renderGraph()" style="font-size:.82rem;padding:5px 10px;">
      </select>
    </div>
    <div id="player-checkboxes" class="player-checkbox-grid"></div>
    <div class="chart-container"><canvas id="graph-canvas"></canvas></div>
    <p style="font-size:.75rem;color:var(--muted);margin-top:.75rem;">半荘ごとの累積ポイント推移（チップは含まず）</p>
  </div>
</div>

<!-- INPUT -->
<div id="page-input" class="page">
  <!-- STEP 1: 対局情報 -->
  <div id="step1-card" class="card">
    <div class="card-title">📋 STEP 1 — 対局情報</div>
    <div class="form-grid" style="margin-bottom:1.2rem;">
      <div class="form-group"><label>対局日</label><input type="date" id="inp-date"></div>
      <div class="form-group"><label>場所</label><input type="text" id="inp-venue" placeholder="例：柳　赤坂店" list="venue-list">
        <datalist id="venue-list"></datalist>
      </div>
    </div>
    <div style="margin-bottom:.6rem;display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
      <span style="font-size:.78rem;font-weight:700;color:var(--muted);">参加プレイヤー（4〜6名）</span>
      <button class="btn btn-secondary" onclick="addPlayerSlot()" style="padding:4px 10px;font-size:.78rem;">＋ 追加</button>
      <button class="btn btn-secondary" onclick="removePlayerSlot()" style="padding:4px 10px;font-size:.78rem;">－ 削除</button>
    </div>
    <div id="player-slots"></div>
    <div style="margin-top:1rem;display:flex;gap:8px;flex-wrap:wrap;">
      <button class="btn btn-primary" onclick="goToStep2()">次へ：半荘を入力 →</button>
      <button class="btn btn-secondary" onclick="initInput()">クリア</button>
    </div>
  </div>

  <!-- STEP 2: 半荘入力 -->
  <div id="step2-card" class="card" style="display:none;">
    <div class="card-title" id="step2-title">🀄 STEP 2 — 半荘結果入力</div>
    <div id="step2-meta" style="font-size:.82rem;color:var(--muted);margin-bottom:1rem;"></div>

    <div id="rounds-list"></div>

    <button class="btn btn-secondary" onclick="addRound()" style="margin-bottom:1rem;">＋ 半荘を追加</button>

    <!-- チップ入力（対局日単位） -->
    <div style="border-top:1px solid var(--border);padding-top:1rem;margin-top:.5rem;">
      <div style="font-size:.78rem;font-weight:700;color:var(--muted);margin-bottom:.6rem;">🪙 チップ（対局日合計）</div>
      <div id="chip-inputs" style="display:grid;gap:6px;"></div>
    </div>

    <div style="margin-top:1.2rem;display:flex;gap:8px;flex-wrap:wrap;">
      <button class="btn btn-primary" onclick="saveNewGame()">💾 保存</button>
      <button class="btn btn-secondary" onclick="backToStep1()">← 戻る</button>
      <button class="btn btn-secondary" onclick="initInput()">クリア</button>
    </div>
  </div>
</div>

</main>

<div class="toast" id="toast"></div>

const PLAYER_COLORS = ['#1a6b3c','#1a5fa8','#c8991a','#b03020','#5b21b6','#92400e','#166534','#9d174d','#0f766e','#b45309'];
let allSessions=[], userSessions=[], seasonFilter='all', graphChart=null;
const STORAGE_KEY='yanagi_user_v2';
const ALL_PLAYERS=['太田(一)','高谷','神田','太田(良)','川瀬','久保','永川','佐々木','平野'];

async function loadData(){
  allSessions=[...PRESET_SESSIONS];
  // 外部data.jsonが存在すれば取得してマージ
  try{
    const res = await fetch('data.json?_=' + Date.now());
    if(res.ok){
      const external = await res.json();
      if(Array.isArray(external)) allSessions = [...allSessions, ...external];
    }
  }catch(e){}
  // localStorageの入力中データもマージ（入力担当者のみ）
  try{userSessions=JSON.parse(localStorage.getItem(STORAGE_KEY)||'[]');}catch(e){userSessions=[];}
  allSessions=[...allSessions,...userSessions].sort((a,b)=>b.date.localeCompare(a.date));
}

function getFiltered(type, val){
  if(type==='season') return val==='all'?allSessions:allSessions.filter(s=>s.season===val);
  if(type==='venue') return val==='all'?allSessions:allSessions.filter(s=>normalizeVenue(s.venue)===val);
  return allSessions;
}

function normalizeVenue(v){
  if(!v) return '';
  return v.replace(/\u3000/g,' ').replace(/\s+/g,' ').trim();
}

function getSeasons(){
  const s=new Set(allSessions.map(s=>s.season).filter(Boolean));
  return [...s].sort((a,b)=>b.localeCompare(a));
}

function buildSeasonFilter(){
  const bar=document.getElementById('season-filter');

function buildGraphSeasonSelect(){

function getVenues(){
  const s=new Set(allSessions.map(s=>normalizeVenue(s.venue)).filter(Boolean));
  return [...s].sort();
}

function calcPlayerStats(sessions){
  const stats={};
  for(const sess of sessions){
    for(const r of sess.rounds){
      for(const [name,score] of Object.entries(r.scores)){
        if(score===null) continue;
        if(!stats[name]) stats[name]={games:0,hanso:0,wins:0,ranks:[0,0,0,0],totalScore:0,totalChip:0,sumRank:0};
        const s=stats[name];
        s.hanso++;
        if(r.ranks[name]){s.ranks[r.ranks[name]-1]++;s.sumRank+=r.ranks[name];if(r.ranks[name]===1)s.wins++;}
        s.totalScore+=score;
      }
    }
    if(sess.chips){
      for(const [name,c] of Object.entries(sess.chips)){
        if(stats[name]&&c!==null&&c!==0) stats[name].totalChip+=c;
      }
    }
    const seen=new Set();
    for(const r of sess.rounds) for(const [n,v] of Object.entries(r.scores)) if(v!==null) seen.add(n);
    seen.forEach(n=>{if(stats[n]) stats[n].games++;});
  }
  for(const s of Object.values(stats)) s.avgRank=s.hanso>0?s.sumRank/s.hanso:0;
  return stats;
}

// --- GRAPH ---
let checkedPlayers=new Set();
function buildGraphData(season){
  const sessions=getFiltered('season',season);
  // Build per-player cumulative score series (half-round by half-round, chronological)
  const chronoRounds=[];
  const sortedSess=[...sessions].sort((a,b)=>a.date.localeCompare(b.date));
  for(const sess of sortedSess){
    for(const r of sess.rounds){
      if(r.round==='チップ') continue;
      chronoRounds.push({date:sess.date, round:r.round, scores:r.scores, venue:normalizeVenue(sess.venue)});
    }
  }
  // Get all players who appear
  const players=new Set();
  for(const r of chronoRounds) for(const [p,v] of Object.entries(r.scores)) if(v!==null) players.add(p);
  // Build series
  const series={};
  for(const p of players){
    let cum=0;
    const pts=[{x:0,y:0}];
    for(let i=0;i<chronoRounds.length;i++){
      const sc=chronoRounds[i].scores[p];
      if(sc!==null&&sc!==undefined){cum+=sc;}
      pts.push({x:i+1,y:cum,label:`${chronoRounds[i].date} ${chronoRounds[i].round}`});
    }
    series[p]=pts;
  }
  return {series, labels:['開始',...chronoRounds.map((r,i)=>`${r.date.slice(5)} ${r.round}`)], players:[...players]};
}

function initGraphCheckboxes(players){
  const el=document.getElementById('player-checkboxes');
  el.innerHTML=players.map((p,i)=>{
    const color=PLAYER_COLORS[i%PLAYER_COLORS.length];
    const checked=checkedPlayers.has(p);
    return `<div class="player-cb ${checked?'checked':''}" id="cb-${p}" style="${checked?`background:${color};`:'color:var(--text)'}" onclick="togglePlayer('${p}','${color}')">${p}</div>`;
  }).join('');
}

function togglePlayer(p, color){
  const el=document.getElementById('cb-'+p);
  if(checkedPlayers.has(p)){
    checkedPlayers.delete(p);
    el.classList.remove('checked');
    el.style.background='';el.style.color='var(--text)';
  } else {
    checkedPlayers.add(p);
    el.classList.add('checked');
    el.style.background=color;el.style.color='white';
  }
  drawGraph();
}

function drawGraph(){
  const season=document.getElementById('graph-season').value;
  const {series,labels,players}=buildGraphData(season);
  const datasets=[];
  players.forEach((p,i)=>{
    if(!checkedPlayers.has(p)) return;
    const color=PLAYER_COLORS[i%PLAYER_COLORS.length];
    datasets.push({
      label:p, data:series[p].map(pt=>pt.y),
      borderColor:color, backgroundColor:color+'22',
      borderWidth:2, pointRadius:2, pointHoverRadius:5, tension:0.1, fill:false
    });
  });
  const ctx=document.getElementById('graph-canvas').getContext('2d');
  if(graphChart){graphChart.destroy();}
  graphChart=new Chart(ctx,{
    type:'line',
    data:{labels,datasets},
    options:{
      responsive:true, maintainAspectRatio:false,
      interaction:{mode:'index',intersect:false},
      plugins:{
        legend:{position:'bottom',labels:{font:{size:11},boxWidth:14,padding:10}},
        tooltip:{callbacks:{title:items=>`${items[0].label}（半荘${items[0].dataIndex}）`}}
      },
      scales:{
        x:{ticks:{maxTicksLimit:15,maxRotation:45,font:{size:10}},grid:{color:'rgba(0,0,0,.05)'}},
        y:{ticks:{font:{size:11}},grid:{color:'rgba(0,0,0,.06)'},
          title:{display:true,text:'累積ポイント',font:{size:11}}}
      }
    }
  });
}

function renderGraph(){
  buildGraphSeasonSelect();
  const season=document.getElementById('graph-season').value;
  const {players}=buildGraphData(season);
  // Preserve checked state, add new players as unchecked
  initGraphCheckboxes(players);
  drawGraph();
}

  chipEl.innerHTML = players.map(p=>`<div style="display:flex;align-items:center;gap:6px;">
    <label style="min-width:60px;font-size:.8rem;">${p}</label>
    <input type="number" id="chip-${p.replace(/[()]/g,'_')}" placeholder="0" step="1" style="width:80px;">
  </div>`).join('');
  addRound();
}

function backToStep1(){
  document.getElementById('step1-card').style.display = '';
  document.getElementById('step2-card').style.display = 'none';
}

const ROUND_NUMS = ['①','②','③','④','⑤','⑥','⑦','⑧','⑨','⑩','⑪','⑫'];
function addRound(){
  currentRoundCount++;
  const idx = currentRoundCount;
  const rnum = ROUND_NUMS[idx-1]||`(${idx})`;
  const players = currentPlayers;
  const cols = `repeat(${players.length},1fr)`;
  const list = document.getElementById('rounds-list');
  const div = document.createElement('div');
  div.id = `round-block-${idx}`;
  div.style.cssText = 'border:1px solid var(--border);border-radius:8px;padding:10px 12px;margin-bottom:8px;';
  div.innerHTML = `<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;">
    <span style="font-size:.82rem;font-weight:700;color:var(--muted);">半荘 ${rnum}</span>
    ${idx>1?`<button onclick="removeRound(${idx})" style="background:none;border:none;cursor:pointer;font-size:.8rem;color:var(--muted);">✕ 削除</button>`:''}
  </div>
  <div style="display:grid;grid-template-columns:${cols};gap:6px;">
    ${players.map(p=>`<div>
      <div style="font-size:.72rem;color:var(--muted);margin-bottom:3px;">${p}</div>
      <input type="number" id="r${idx}-s-${p.replace(/[()]/g,'_')}" placeholder="点数" step="1" style="width:100%;" oninput="autoRank(${idx})">
    </div>`).join('')}
  </div>
  <div id="r${idx}-rank-preview" style="font-size:.75rem;color:var(--muted);margin-top:5px;"></div>`;
  list.appendChild(div);
}

function removeRound(idx){
  const el = document.getElementById(`round-block-${idx}`);
  if(el) el.remove();
}

function autoRank(idx){
  const players = currentPlayers;
  const inputs = players.map(p=>({
    p,
    el: document.getElementById(`r${idx}-s-${p.replace(/[()]/g,'_')}`)
  }));
  const filled   = inputs.filter(x=>x.el&&x.el.value!=='');
  const unfilled = inputs.filter(x=>x.el&&x.el.value==='');

  // 残り1人のとき合計0になるよう自動補完
  if(unfilled.length===1 && filled.length>=2){
    const sum = filled.reduce((t,x)=>t+parseFloat(x.el.value),0);
    const auto = -sum;
    unfilled[0].el.value = auto;
    unfilled[0].el.style.background='#fff8e1'; // 自動入力を薄黄色で区別
  } else {
    // 手動入力欄の背景をリセット
    inputs.forEach(x=>{if(x.el) x.el.style.background='';});
  }

  // 順位プレビュー更新
  const scores = inputs.map(x=>({p:x.p, v:x.el&&x.el.value!==''?parseFloat(x.el.value):null}));
  const sortedFilled = scores.filter(x=>x.v!==null).sort((a,b)=>b.v-a.v);
  const preview = sortedFilled.map((x,i)=>`${i+1}位:${x.p}(${x.v>=0?'+':''}${x.v})`).join('　');
  const previewEl = document.getElementById(`r${idx}-rank-preview`);
  if(previewEl) previewEl.textContent = preview;
}

function saveNewGame(){
  const date = document.getElementById('inp-date').value;
  const venue = document.getElementById('inp-venue').value.trim();
  // derive season from year of date
  const year = date?date.slice(0,4):'2025';
  // fiscal year: Jan-Mar counts as previous year
  const month = date?parseInt(date.slice(5,7)):4;
  const season = month<=3 ? String(parseInt(year)-1) : year;

  const players = currentPlayers;
  // collect rounds
  const roundBlocks = document.querySelectorAll('[id^="round-block-"]');
  if(roundBlocks.length===0){showToast('半荘を1つ以上入力してください');return;}
  const rounds = [];
  for(let b=0;b<roundBlocks.length;b++){
    const idx = roundBlocks[b].id.replace('round-block-','');
    const rnum = ROUND_NUMS[b]||`(${parseInt(idx)})`;
    const scores={}, ranks={};
    const scored = players.map(p=>{
      const el = document.getElementById(`r${idx}-s-${p.replace(/[()]/g,'_')}`);
      const v = (el&&el.value!=='')?parseFloat(el.value):null;
      scores[p]=v;
      return {p,v};
    });
    // compute ranks from scores (nulls last)
    const filled = scored.filter(x=>x.v!==null).sort((a,b)=>b.v-a.v);
    filled.forEach((x,i)=>ranks[x.p]=i+1);
    players.forEach(p=>{if(ranks[p]===undefined)ranks[p]=null;});
    // require at least 2 players scored
    if(filled.length<2){showToast(`半荘${rnum}に2人以上の点数を入力してください`);return;}
    rounds.push({round:rnum,scores,ranks});
  }
  // chips
  const chips={};
  players.forEach(p=>{
    const el = document.getElementById(`chip-${p.replace(/[()]/g,'_')}`);
    chips[p]=el&&el.value!==''?parseFloat(el.value):0;
  });
  const sess={date,venue,season,players,rounds,chips};
  if(editingUIdx>=0){
    userSessions[editingUIdx]=sess;
    showToast('✅ 更新しました');
  } else {
    userSessions.unshift(sess);
    showToast('✅ 保存しました');
  }
  localStorage.setItem(STORAGE_KEY,JSON.stringify(userSessions));
  loadData(); initInput();
}



function showPage(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('nav button').forEach((b,i)=>{
    b.classList.toggle('active',['home','history','players','graph','input'][i]===id);
  });
  document.getElementById('page-'+id).classList.add('active');
  if(id==='home') renderHome();
  if(id==='history') renderHistory();
  if(id==='players'){initPlayerFilter();renderPlayers();}
  if(id==='graph') renderGraph();
  if(id==='input') initInput();
}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}

// エクスポート機能
function exportData(){
  const data = JSON.stringify(userSessions, null, 2);
  const blob = new Blob([data], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'data.json';
  a.click();
  showToast('📥 data.json をエクスポートしました。GitHubにアップロードしてください。');
}

// Init
(async () => {
  await loadData();
  renderHome();
  initPlayerFilter();
})();
</script>
